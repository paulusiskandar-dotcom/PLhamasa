name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 16.79.81.18 >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@16.79.81.18 << 'EOF'
            set -e

            echo "════════════════════════════════════════"
            echo "DEPLOYING PLhamasa TO EC2"
            echo "════════════════════════════════════════"

            cd /home/ubuntu/source/PLhamasa

            echo ""
            echo "[1/6] Git pull latest changes..."
            echo "════════════════════════════════════════"
            git fetch origin main
            BEFORE_SHA=$(git rev-parse HEAD)
            git reset --hard origin/main
            AFTER_SHA=$(git rev-parse HEAD)
            echo "  Before: $BEFORE_SHA"
            echo "  After:  $AFTER_SHA"

            echo ""
            echo "[2/6] Backend dependencies..."
            echo "════════════════════════════════════════"
            cd backend
            npm install --production
            cd ..

            echo ""
            echo "[3/6] Frontend dependencies..."
            echo "════════════════════════════════════════"
            cd frontend
            npm install --production
            cd ..

            echo ""
            echo "[4/6] Apply DB schema..."
            echo "════════════════════════════════════════"

            if ! command -v psql &> /dev/null; then
              echo "  psql not found, installing postgresql-client..."
              sudo apt-get update -qq
              sudo apt-get install -y postgresql-client
            fi

            set -a
            source backend/.env
            set +a

            if [ ! -f backend/docs/schema.sql ]; then
              echo "  schema.sql not found, skipping..."
            else
              echo "  Applying to $PLM_DB_HOST/$PLM_DB_NAME..."
              PGPASSWORD="$PLM_DB_PASS" psql \
                -h "$PLM_DB_HOST" \
                -p "${PLM_DB_PORT:-5432}" \
                -U "$PLM_DB_USER" \
                -d "$PLM_DB_NAME" \
                -v ON_ERROR_STOP=0 \
                -f backend/docs/schema.sql 2>&1 | tail -40
              echo "  Schema step done"
            fi

            echo ""
            echo "[5/6] Restart PM2 services (delete + start from correct dir)..."
            echo "════════════════════════════════════════"

            # Backend: delete and re-start from backend/ so dotenvx finds .env
            pm2 stop PLhamasa-backend 2>/dev/null || true
            pm2 delete PLhamasa-backend 2>/dev/null || true
            cd backend
            pm2 start app.js --name PLhamasa-backend
            cd ..

            # Frontend: delete and re-start from frontend/ so dotenvx finds .env
            pm2 stop PLhamasa-frontend 2>/dev/null || true
            pm2 delete PLhamasa-frontend 2>/dev/null || true
            cd frontend
            pm2 start engine.js --name PLhamasa-frontend
            cd ..

            pm2 save

            echo "  Waiting 5 seconds for startup..."
            sleep 5

            echo ""
            echo "[6/6] Verify status..."
            echo "════════════════════════════════════════"
            pm2 list | grep PLhamasa

            echo ""
            echo "  Ports listening:"
            sudo ss -tlnp | grep -E ":(3000|3001)" || echo "  ❌ No ports found"

            echo ""
            echo "  Backend health:"
            curl -s -m 5 -o /dev/null -w "  port 3001 → HTTP %{http_code}\n" http://localhost:3001/ || echo "  ❌ backend not responding"

            echo "  Frontend health:"
            curl -s -m 5 -o /dev/null -w "  port 3000 → HTTP %{http_code}\n" http://localhost:3000/ || echo "  ❌ frontend not responding"

            echo ""
            echo "════════════════════════════════════════"
            echo "DEPLOYMENT COMPLETE"
            echo "════════════════════════════════════════"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
