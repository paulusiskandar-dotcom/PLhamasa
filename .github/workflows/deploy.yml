name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 16.79.81.18 >> ~/.ssh/known_hosts

      - name: Deploy code to EC2
        run: |
          cat .github/scripts/deploy-code.sh | ssh -i ~/.ssh/deploy_key ubuntu@16.79.81.18 'bash -s'

      - name: Apply DB schema
        env:
          PLM_DB_HOST: ${{ secrets.PLM_DB_HOST }}
          PLM_DB_PORT: ${{ secrets.PLM_DB_PORT }}
          PLM_DB_NAME: ${{ secrets.PLM_DB_NAME }}
          PLM_DB_USER: ${{ secrets.PLM_DB_USER }}
          PLM_DB_PASS: ${{ secrets.PLM_DB_PASS }}
        run: |
          if [ -z "$PLM_DB_HOST" ] || [ -z "$PLM_DB_NAME" ] || [ -z "$PLM_DB_USER" ] || [ -z "$PLM_DB_PASS" ]; then
            echo "❌ DB secrets tidak lengkap di GitHub Settings"
            echo "  Required: PLM_DB_HOST, PLM_DB_NAME, PLM_DB_USER, PLM_DB_PASS"
            exit 1
          fi
          echo "  Connecting as: $PLM_DB_USER@$PLM_DB_HOST:${PLM_DB_PORT:-5432}/$PLM_DB_NAME"
          echo "  PLM_DB_PASS length: ${#PLM_DB_PASS}"

          cat .github/scripts/apply-schema.sh | ssh -i ~/.ssh/deploy_key \
            ubuntu@16.79.81.18 \
            "PLM_DB_HOST='$PLM_DB_HOST' \
             PLM_DB_PORT='${PLM_DB_PORT:-5432}' \
             PLM_DB_NAME='$PLM_DB_NAME' \
             PLM_DB_USER='$PLM_DB_USER' \
             PLM_DB_PASS='$PLM_DB_PASS' \
             bash -s"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
